# JPA / Hibernate - change to update to create tables with hibarnate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Auth0 / Okta OAuth2 configuration
okta.oauth2.issuer=${OAUTH_ISSUER}
okta.oauth2.client-id=${OAUTH_ID}
okta.oauth2.client-secret=${OAUTH_SECRET}

# JWT Configuration
jwt.secret=${OAUTH_SECRET}
jwt.expiration=900000

# Google Auth
logging.level.org.apache.tomcat.util.http.parser.Cookie=ERROR
GOOGLE_CLIENT_ID=${GOOGLE_AUTH}


#Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration